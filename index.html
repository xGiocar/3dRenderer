<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Document</title>
</head>
<body>
    <canvas id="canvas" width="600" height="600">Canvas</canvas>
    <div class="input">
        <div class="row">
            <label for="xAngle">X Angle</label>
            <input type="range" min="0" max="360" value="0" class="slider" id="xAngle">
            <p class="value" id="pX">0°</p>
        </div>

        <div class="row">
            <label for="yAngle">Y Angle</label>
            <input type="range" min="0" max="360" value="0" class="slider" id="yAngle">
            <p class="value" id="pY">0°</p>
        </div>

        <div class="row">
            <label for="zAngle">Z Angle</label>
            <input type="range" min="0" max="360" value="0" class="slider" id="zAngle">
            <p class="value" id="pZ">0°</p>
        </div>

        <div class="row">
            <label for="xSpinCheck">Auto-rotate on X axis</label>
            <input type="checkbox" class="checkbox" id="xSpinCheck">
            <input type="range" min="0" max="720" value="45" class="slider" id="xSpinSpeed">
            <p class="value" id="XSpinParagraph">45°/sec</p>
        </div>

        <div class="row">
            <label for="ySpinCheck">Auto-rotate on Y axis</label>
            <input type="checkbox" class="checkbox" id="ySpinCheck">
            <input type="range" min="0" max="720" value="45" class="slider" id="ySpinSpeed">
            <p class="value" id="YSpinParagraph">45°/sec</p>
        </div>

        <div class="row">
            <label for="zSpinCheck">Auto-rotate on Z axis</label>
            <input type="checkbox" class="checkbox" id="zSpinCheck">
            <input type="range" min="0" max="720" value="45" class="slider" id="zSpinSpeed">
            <p class="value" id="ZSpinParagraph">45°/sec</p>
        </div>

        <p>Upload your .obj file</p>
        <div class="row">
            <input type="file" id="fileInput">
        </div>

        <div class="row">
            <label for="colorPicker">Pick color</label>
            <input type="color" id="colorPicker" value="#66FF66">
        </div>
    </div>

    <script type="module" src="index.js"></script>

</body>
</html>
